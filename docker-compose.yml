services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-2.5-flash}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      REPOLENS_API_BASE_URL: ${REPOLENS_API_BASE_URL:-http://api:8000}
    depends_on:
      - api
    ports:
      - "8501:8501"
